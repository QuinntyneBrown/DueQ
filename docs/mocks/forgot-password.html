<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>DueQ — Forgot password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Auth shell — shared shape with sign-in.html / create-account.html. */
    .auth {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--s-5) var(--s-4);
    }
    .auth-brand {
      display: flex;
      align-items: center;
      gap: var(--s-2);
      font-weight: 600;
      color: var(--ink);
      margin-bottom: var(--s-6);
    }
    .auth-card {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--r-3);
      padding: var(--s-6) var(--s-5);
    }
    .auth-card h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0 0 var(--s-1);
      color: var(--ink);
    }
    .auth-card .sub {
      color: var(--muted);
      font-size: 14px;
      margin: 0 0 var(--s-5);
    }
    .auth-footer {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-top: var(--s-5);
    }
    .auth-footer a {
      color: var(--ink);
      font-weight: 500;
    }
  </style>
</head>
<body>

  <div class="auth">

    <div class="auth-brand">
      <span class="brand-mark">D</span>
      <span>DueQ</span>
    </div>

    <div class="auth-card">
      <h1>Reset your password</h1>
      <p class="sub">Enter the email on your account and we'll send you a reset link.</p>

      <form class="form">

        <div class="field">
          <label for="email">Email</label>
          <input class="input" id="email" type="email" autocomplete="email" placeholder="you@example.com" value="quinntynebrown@gmail.com" />
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-block" style="margin-top: var(--s-2);">Send reset link</button>

      </form>

      <div class="auth-footer">
        Remembered it? <a href="sign-in.html">Back to sign in</a>
      </div>
    </div>

  </div>

</body>
</html>
