<div class="app">

  <header class="app-header">
    <div class="brand">
      <lib-brand-mark [ariaHidden]="true" />
      <span>{{ title() }}</span>
    </div>
    @switch (action()?.kind) {
      @case ('gear') {
        <a class="header-action" [routerLink]="action()!.route" aria-label="Settings">⚙</a>
      }
      @case ('add-bill') {
        <a class="header-action" [routerLink]="action()!.route" aria-label="Add Bill">＋</a>
      }
      @case ('cancel') {
        <a class="header-text-action" [routerLink]="action()!.route">Cancel</a>
      }
      @case ('skip') {
        <a class="header-text-action" [routerLink]="action()!.route">Skip</a>
      }
    }
  </header>

  <aside class="app-sidebar" aria-label="Main">
    <div class="brand">
      <lib-brand-mark label="DueQ" [ariaHidden]="true" />
    </div>
    <lib-nav-link icon="⌂" label="Dashboard" routerLink="/dashboard" />
    <lib-nav-link icon="▤" label="Bills" routerLink="/bills" [exact]="true" />
    <lib-nav-link icon="↻" label="History" routerLink="/history" />
    <lib-nav-link icon="＋" label="Add Bill" routerLink="/bills/new" />
    <lib-nav-link icon="↓" label="Record Payment" routerLink="/payments/new" />
    <lib-nav-link icon="◔" label="Settings" routerLink="/settings" />
    <div class="footer">
      <lib-avatar [initials]="yourInitials()" [ariaHidden]="true" />
      <div class="name">{{ yourName() }}</div>
    </div>
  </aside>

  <main class="app-main">
    <div class="container">
      <router-outlet />
    </div>
  </main>

  <nav class="bottom-nav" aria-label="Primary">
    <lib-nav-item icon="⌂" label="Home" routerLink="/dashboard" [exact]="true" />
    <lib-nav-item icon="▤" label="Bills" routerLink="/bills" [exact]="true" />
    <div class="bottom-action">
      <lib-floating-action-button icon="＋" ariaLabel="Add Bill" routerLink="/bills/new" />
    </div>
    <lib-nav-item icon="↻" label="History" routerLink="/history" />
    <lib-nav-item icon="◔" label="You" routerLink="/settings" />
  </nav>
</div>
