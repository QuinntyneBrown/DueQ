<div class="auth">

  <a class="auth-brand" routerLink="/sign-in" aria-label="DueQ">
    <lib-brand-mark [ariaHidden]="true" />
    <span>DueQ</span>
  </a>

  <div class="auth-card">
    <h1>Choose a new password</h1>
    <p class="sub">Pick something at least 8 characters long.</p>

    @if (missingToken()) {
      <div class="auth-error" role="alert">
        This reset link is missing its token. Request a new link from the
        <a routerLink="/forgot-password">forgot password</a> page.
      </div>
    } @else {
      <form class="form" [formGroup]="form" (ngSubmit)="submit()" novalidate>

        <lib-form-field label="New password" for="password">
          <lib-text-input
            inputId="password"
            type="password"
            autocomplete="new-password"
            placeholder="••••••••"
            formControlName="password"
          />
        </lib-form-field>

        <lib-form-field label="Confirm password" for="confirm">
          <lib-text-input
            inputId="confirm"
            type="password"
            autocomplete="new-password"
            placeholder="••••••••"
            formControlName="confirm"
          />
        </lib-form-field>

        @if (errorMessage(); as msg) {
          <div class="auth-error" role="alert" data-testid="reset-password-error">{{ msg }}</div>
        }

        <button
          type="submit"
          class="btn btn-primary btn-lg btn-block auth-submit"
          [disabled]="submitting()"
        >Set new password</button>

      </form>
    }

    <div class="auth-footer">
      <a routerLink="/sign-in">Back to sign in</a>
    </div>
  </div>

</div>
