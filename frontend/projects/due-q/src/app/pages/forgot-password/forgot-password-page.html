<div class="auth">

  <a class="auth-brand" routerLink="/sign-in" aria-label="DueQ">
    <lib-brand-mark [ariaHidden]="true" />
    <span>DueQ</span>
  </a>

  <div class="auth-card">

    @if (submittedEmail(); as email) {
      <h1>Check your inbox</h1>
      <p class="sub" data-testid="forgot-password-success">
        Check your inbox at {{ email }}. If an account exists, a reset link is on its way.
      </p>
    } @else {
      <h1>Reset your password</h1>
      <p class="sub">Enter the email on your account and we'll send you a reset link.</p>

      <form class="form" [formGroup]="form" (ngSubmit)="submit()" novalidate>

        <lib-form-field label="Email" for="email">
          <lib-text-input
            inputId="email"
            type="email"
            autocomplete="email"
            placeholder="you@example.com"
            formControlName="email"
          />
        </lib-form-field>

        <button
          type="submit"
          class="btn btn-primary btn-lg btn-block auth-submit"
          [disabled]="submitting()"
        >Send reset link</button>

      </form>
    }

    <div class="auth-footer">
      Remembered it? <a routerLink="/sign-in">Back to sign in</a>
    </div>
  </div>

</div>
