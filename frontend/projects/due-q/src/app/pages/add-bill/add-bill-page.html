<lib-page-head title="Add a bill" subtitle="Split it 50/50 between you and Sam." />

<form class="form" [formGroup]="form" (ngSubmit)="save(false)" novalidate>

  <lib-form-field label="Amount" for="amount" [error]="amountError()" errorTestId="error-amount">
    <lib-amount-input inputId="amount" formControlName="amount" valueMode="string" />
  </lib-form-field>

  <lib-form-field label="What was it for?" for="bill-name" [error]="nameError()" errorTestId="error-name">
    <lib-text-input
      inputId="bill-name"
      formControlName="name"
      placeholder="e.g. Hydro bill, Groceries"
      ariaLabel="What was it for?"
    />
  </lib-form-field>

  <lib-form-field label="Date" for="bill-date">
    <lib-date-input inputId="bill-date" formControlName="date" />
  </lib-form-field>

  <lib-form-field label="Note" hint="optional" for="bill-note">
    <lib-text-area
      inputId="bill-note"
      formControlName="note"
      placeholder="Anything to remember about this bill?"
    />
  </lib-form-field>

  <hr class="hr-soft" />

  <lib-preview-block
    label="Sam owes"
    [sublabel]="previewSubtitle()"
    [amount]="partnerShare() ?? 0"
    [amountLabel]="'+' + partnerShareText()"
    tone="positive"
    testId="partner-share-preview"
  />

  <div class="action-row">
    <lib-button class="save-another" variant="outline" [block]="true" [disabled]="saving()" (clicked)="save(true)">
      Save &amp; add another
    </lib-button>
    <lib-button class="save-bill" type="submit" size="lg" [block]="true" [disabled]="saving()">
      Save bill
    </lib-button>
  </div>

</form>
