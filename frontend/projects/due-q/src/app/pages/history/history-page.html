<lib-page-head title="History" subtitle="Every bill and payment, newest first." />

<lib-running-balance-card
  [balance]="runningBalanceAmount()"
  [balanceLabel]="runningBalance()"
  balanceTestId="running-balance"
  [logged]="totalLoggedAmount()"
  [loggedLabel]="totalLogged()"
  loggedTestId="total-logged"
  [paidBack]="totalPaidBackAmount()"
  [paidBackLabel]="totalPaidBack()"
  paidBackTestId="total-paid-back"
  [partnerName]="partnerName()"
/>

<lib-chip-group class="history-filter" ariaLabel="History filter">
  @for (f of filters; track f) {
    <lib-chip [label]="f" [active]="isActive(f)" (toggle)="select(f)" />
  }
</lib-chip-group>

@for (month of months(); track month.key) {
  <lib-timeline-group [month]="month.label" [total]="month.monthTotalText" totalTestId="month-total">
    @for (entry of month.entries; track entry.id) {
      <li>
        <lib-timeline-row [entry]="entry" balanceTestId="row-running-balance" />
      </li>
    }
  </lib-timeline-group>
}
