<lib-page-head title="Bills" subtitle="All bills logged between you and Sam." />

<lib-chip-group ariaLabel="Bill filter">
  <lib-chip label="All" [count]="counts().all" [active]="isActive('All')" countTestId="chip-count" (toggle)="select('All')" />
  <lib-chip label="Unsettled" [count]="counts().unsettled" [active]="isActive('Unsettled')" countTestId="chip-count" (toggle)="select('Unsettled')" />
  <lib-chip label="Settled" [count]="counts().settled" [active]="isActive('Settled')" countTestId="chip-count" (toggle)="select('Settled')" />
</lib-chip-group>

@if (isEmpty()) {
  <div class="empty" data-testid="empty-state">No bills yet — add your first one.</div>
} @else {
  @for (group of months(); track group.key) {
    <lib-bill-month-group [month]="group.label" [total]="group.total" totalTestId="month-total">
      @for (bill of group.bills; track bill.id) {
        <lib-bill-list-item [bill]="bill" [href]="['/bills', bill.id]" statusTestId="status-badge" />
      }
    </lib-bill-month-group>
  }
}
