<lib-back-link label="Back" routerLink="/dashboard" />

<lib-page-head
  [title]="pageTitle()"
  [subtitle]="pageSubtitle()"
/>

@if (loaded()) {
  <lib-preview-block
    class="current-balance-block"
    [label]="currentBalanceLabel()"
    sublabel="As of today"
    [amount]="currentBalance()"
    [amountLabel]="currentBalanceText()"
    amountTestId="current-balance"
    [dark]="true"
  />
}

<form class="form" [formGroup]="form" (ngSubmit)="save()" novalidate>

  <lib-form-field label="Amount received" for="payment-amount" [error]="amountError()" errorTestId="error-amount">
    <lib-amount-input inputId="payment-amount" formControlName="amount" valueMode="string" />
  </lib-form-field>

  <lib-form-field label="Date received" for="payment-date" [error]="dateError()" errorTestId="error-date">
    <lib-date-input inputId="payment-date" formControlName="date" />
  </lib-form-field>

  <lib-form-field label="Method" hint="optional">
    <lib-segmented-control [options]="methodOptions" ariaLabel="Payment method" formControlName="method" />
  </lib-form-field>

  <lib-form-field label="Note" hint="optional" for="payment-note">
    <lib-text-area inputId="payment-note" formControlName="note" placeholder="e.g. partial — rest by Friday" />
  </lib-form-field>

  <hr class="hr-soft" />

  <lib-preview-block
    label="New balance after payment"
    [sublabel]="previewSubtitle()"
    [amount]="newBalance()"
    [amountLabel]="newBalanceText()"
    [tone]="overpayment() ? 'negative' : 'positive'"
    testId="new-balance-preview"
  />

  @if (overpayment()) {
    <div class="overpayment" data-testid="overpayment-warning">
      {{ overpaymentWarning() }}
    </div>
  }

  <lib-button class="save-btn" type="submit" size="lg" [block]="true" [disabled]="saving()">Save payment</lib-button>

</form>
