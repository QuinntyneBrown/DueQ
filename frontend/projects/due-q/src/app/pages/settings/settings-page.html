<lib-page-head
  title="Who's splitting?"
  subtitle="Tell us your name and your partner's name. Every bill is split 50/50 between the two of you."
/>

@if (ready()) {
  <form class="form" [formGroup]="form" (ngSubmit)="save()" novalidate>
    <div class="people-pair">

      <lib-person-card
        role="You"
        [initials]="yourInitials()"
        variant="you"
        hint="Initial shown on receipts and the split bar."
        avatarTestId="avatar-you"
      >
        <lib-form-field label="Your name" for="you-name" [error]="yourError()" errorTestId="error-you-name">
          <lib-text-input inputId="you-name" formControlName="yourName" placeholder="e.g. Quinntyne Brown" />
        </lib-form-field>
      </lib-person-card>

      <lib-person-card
        role="Partner"
        [initials]="partnerInitials()"
        variant="partner"
        hint="This is who owes you half of every bill you log."
        avatarTestId="avatar-partner"
      >
        <lib-form-field label="Partner's name" for="partner-name" [error]="partnerError()" errorTestId="error-partner-name">
          <lib-text-input inputId="partner-name" formControlName="partnerName" placeholder="e.g. Sam" />
        </lib-form-field>
      </lib-person-card>

    </div>

    <lib-button class="save-button" type="submit" size="lg" [block]="true">Save</lib-button>
  </form>
}
