<lib-back-link label="Back" href="/dashboard" />
<lib-page-head
  [title]="'Record a payment from ' + partnerName()"
  [subtitle]="'Log money ' + partnerName() + ' sent you toward what they owe.'"
/>

<lib-preview-block
  [label]="currentBalanceLabel()"
  sublabel="As of today"
  [amount]="currentBalance()"
  [dark]="true"
  data-testid="current-balance"
/>

<form class="form" [formGroup]="form" (ngSubmit)="save()">

  <lib-form-field label="Amount received" for="amount">
    <lib-amount-input formControlName="amount" inputId="amount" />
    @if (amountError()) {
      <p class="error" data-testid="error-amount">{{ amountError() }}</p>
    }
  </lib-form-field>

  <lib-form-field label="Date received" for="date">
    <lib-date-input formControlName="date" inputId="date" />
  </lib-form-field>

  <lib-form-field label="Method" hint="(optional)">
    <lib-segmented-control [options]="methodOptions" formControlName="method" />
  </lib-form-field>

  <lib-form-field label="Note" hint="(optional)" for="note">
    <lib-text-area formControlName="note" inputId="note" placeholder="e.g. partial — rest by Friday" />
  </lib-form-field>

  <hr class="divider" />

  <lib-preview-block
    label="New balance after payment"
    [sublabel]="previewSub()"
    [amount]="newBalance()"
    tone="positive"
    data-testid="new-balance-preview"
  />

  @if (overpay()) {
    <p class="warning" data-testid="overpayment-warning">
      This payment exceeds the outstanding balance.
    </p>
  }

  <lib-button variant="primary" size="lg" [block]="true" type="submit">Save payment</lib-button>

  <div class="cancel">
    <a href="/dashboard">Cancel</a>
  </div>

</form>
