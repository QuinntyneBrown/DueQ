<lib-page-head title="History" subtitle="Every bill and payment, newest first." />

<lib-running-balance-card
  [balance]="runningBalance()"
  [logged]="totalLogged()"
  [paidBack]="totalReceived()"
/>

<lib-chip-group>
  <lib-chip label="All" [active]="filter() === 'all'" (toggle)="setFilter('all')" />
  <lib-chip label="Bills only" [active]="filter() === 'bills'" (toggle)="setFilter('bills')" />
  <lib-chip label="Payments only" [active]="filter() === 'payments'" (toggle)="setFilter('payments')" />
</lib-chip-group>

@for (m of months(); track m.key) {
  <lib-timeline-group [month]="m.label" [total]="m.totalLabel">
    @for (row of m.rows; track row.id) {
      <lib-timeline-row [entry]="row" />
    }
  </lib-timeline-group>
} @empty {
  <p class="empty">Nothing to show yet.</p>
}
