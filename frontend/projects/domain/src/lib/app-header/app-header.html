<div class="brand">
  @if (meta().showBack) {
    <a href="#" class="back" aria-label="Back" (click)="onBack($event)">←</a>
  } @else {
    <lib-brand-mark />
  }
  <span class="title">{{ meta().title }}</span>
</div>
@if (meta().rightAction; as right) {
  <a class="action" [attr.href]="right.href" [attr.aria-label]="right.label">{{ right.label }}</a>
}
