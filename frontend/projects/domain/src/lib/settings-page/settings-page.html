<lib-back-link label="Back" href="/dashboard" />
<lib-page-head
  title="Who's splitting?"
  subtitle="Tell us your name and your partner's name. Every bill is split 50/50 between the two of you."
/>

<form class="form" [formGroup]="form" (ngSubmit)="save()">

  <div class="people-pair">

    <lib-person-card
      role="You"
      [initials]="yourInitials()"
      variant="you"
      hint="Initial shown on receipts and the split bar."
    >
      <lib-form-field label="Your name" for="you-name">
        <lib-text-input formControlName="yourName" inputId="you-name" placeholder="e.g. Quinntyne Brown" />
        @if (yourError()) {
          <p class="error" data-testid="error-you-name">{{ yourError() }}</p>
        }
      </lib-form-field>
    </lib-person-card>

    <lib-person-card
      role="Partner"
      [initials]="partnerInitials()"
      variant="partner"
      hint="This is who owes you half of every bill you log."
    >
      <lib-form-field label="Partner's name" for="partner-name">
        <lib-text-input formControlName="partnerName" inputId="partner-name" placeholder="e.g. Sam" />
        @if (partnerError()) {
          <p class="error" data-testid="error-partner-name">{{ partnerError() }}</p>
        }
      </lib-form-field>
    </lib-person-card>

  </div>

  <lib-button variant="primary" size="lg" [block]="true" type="submit">Save</lib-button>

</form>
