<lib-back-link label="Back" href="/dashboard" />
<lib-page-head title="Add a bill" [subtitle]="'Split it 50/50 between you and ' + partnerName() + '.'" />

<form class="form" [formGroup]="form" (ngSubmit)="save()">

  <lib-form-field label="Amount" for="amount">
    <lib-amount-input formControlName="amount" inputId="amount" />
    @if (amountError()) {
      <p class="error" data-testid="error-amount">{{ amountError() }}</p>
    }
  </lib-form-field>

  <lib-form-field label="What was it for?" for="description">
    <lib-text-input formControlName="description" inputId="description" placeholder="e.g. Hydro bill, Groceries" />
    @if (nameError()) {
      <p class="error" data-testid="error-name">{{ nameError() }}</p>
    }
  </lib-form-field>

  <lib-form-field label="Date" for="date">
    <lib-date-input formControlName="date" inputId="date" />
  </lib-form-field>

  <lib-form-field label="Note" hint="(optional)" for="note">
    <lib-text-area formControlName="note" inputId="note" placeholder="Anything to remember about this bill?" />
  </lib-form-field>

  <hr class="divider" />

  <lib-preview-block
    [label]="previewLabel()"
    [sublabel]="previewSub()"
    [amount]="partnerShare()"
    tone="positive"
    data-testid="partner-share-preview"
  />

  <div class="actions">
    <lib-button variant="outline" type="button" (clicked)="saveAndAddAnother()">Save &amp; add another</lib-button>
    <lib-button variant="primary" size="lg" type="submit">Save bill</lib-button>
  </div>

  <div class="cancel">
    <a href="/dashboard">Cancel</a>
  </div>

</form>
