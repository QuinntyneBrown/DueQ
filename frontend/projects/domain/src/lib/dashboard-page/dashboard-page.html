<lib-page-head [title]="greeting()" [subtitle]="subtitle()" />

<lib-balance-card
  [label]="balanceLabel()"
  [amount]="balance()"
  [meta]="balanceMeta()"
  (addBill)="onAddBill()"
  (recordPayment)="onRecordPayment()"
/>

<lib-stat-row>
  <lib-stat label="This month" [value]="thisMonth()" />
  <lib-stat label="Received" [value]="received()" />
  <lib-stat label="Behind by" [value]="behindBy()" [tone]="behindTone()" />
</lib-stat-row>

<section class="section">
  <lib-section-head title="Recent activity">
    <a href="/history" class="view-all" (click)="$event.preventDefault(); onViewAll()">View all</a>
  </lib-section-head>
  <lib-activity-list [items]="activity()" (rowClick)="onActivityClick($event)" />
</section>
