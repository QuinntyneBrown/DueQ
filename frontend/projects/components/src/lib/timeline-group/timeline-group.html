<section
  class="timeline-group"
  [attr.aria-label]="ariaLabel() ?? month()"
  [attr.data-testid]="testId()"
>
  <h3>
    {{ month() }}
    @if (total()) {
      <span class="month-total" [attr.data-testid]="totalTestId()">{{ total() }}</span>
    }
  </h3>
  <div class="card">
    <div class="list">
      <ng-content></ng-content>
    </div>
  </div>
</section>
