<section class="section" [attr.aria-label]="ariaLabel() ?? month()">
  <div class="section-head">
    <h2>{{ month() }}</h2>
    @if (total()) {
      <span class="total" [attr.data-testid]="totalTestId()">{{ total() }}</span>
    }
  </div>
  <div class="card">
    <div class="list">
      <ng-content></ng-content>
    </div>
  </div>
</section>
