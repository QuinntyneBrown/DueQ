<div class="preview-block" [class.dark]="dark()" [attr.data-testid]="testId()">
  <div>
    <div class="lbl">{{ label() }}</div>
    @if (sublabel()) {
      <div class="sub">{{ sublabel() }}</div>
    }
  </div>
  <div class="val" [class]="tone()" [attr.data-testid]="amountTestId()">
    {{ amountLabel() ?? (amount() | currency) }}
  </div>
</div>
