<div class="split-legend">
  <div>
    <span class="dot you"></span>{{ youName() }} —
    <span [attr.data-testid]="youAmountTestId()">{{ youAmountLabel() ?? (youAmount() | currency:'USD':'symbol':'1.2-2') }}</span>
  </div>
  <div>
    <span class="dot partner"></span>{{ partnerName() }} —
    <span [attr.data-testid]="partnerAmountTestId()">{{ partnerAmountLabel() ?? (partnerAmount() | currency:'USD':'symbol':'1.2-2') }}</span>
  </div>
</div>
