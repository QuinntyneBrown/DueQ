@if (item().href) {
  <a class="row" [routerLink]="item().href" (click)="onClick()">
    <lib-icon-tile [icon]="item().icon" [kind]="kind()" />
    <div class="body">
      <div class="title">{{ item().title }}</div>
      <div class="meta">{{ item().meta }}</div>
    </div>
    <div class="right">
      <div class="amount" [class.received]="isPayment()">{{ displayAmount() }}</div>
      @if (item().sub) {
        <div class="sub">{{ item().sub }}</div>
      }
    </div>
  </a>
} @else {
  <div class="row">
    <lib-icon-tile [icon]="item().icon" [kind]="kind()" />
    <div class="body">
      <div class="title">{{ item().title }}</div>
      <div class="meta">{{ item().meta }}</div>
    </div>
    <div class="right">
      <div class="amount" [class.received]="isPayment()">{{ displayAmount() }}</div>
      @if (item().sub) {
        <div class="sub">{{ item().sub }}</div>
      }
    </div>
  </div>
}
