<input
  class="input"
  [type]="type()"
  [id]="inputId()"
  [placeholder]="placeholder()"
  [disabled]="disabled()"
  [attr.autocomplete]="autocomplete()"
  [attr.aria-label]="ariaLabel()"
  [attr.data-testid]="testId()"
  [ngModel]="value()"
  (ngModelChange)="onChange($event)"
  (blur)="onTouched()"
/>
