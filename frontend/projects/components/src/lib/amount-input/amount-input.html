<div class="input-amount">
  <span class="currency">{{ currency() }}</span>
  <input
    class="input"
    type="text"
    inputmode="decimal"
    [id]="inputId()"
    [placeholder]="placeholder()"
    [disabled]="disabled()"
    [attr.aria-label]="ariaLabel()"
    [attr.data-testid]="testId()"
    [ngModel]="display()"
    (ngModelChange)="onChange($event)"
    (blur)="onTouched()"
  />
</div>
